[project]
name = "claude-damn"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "pytest>=9.0.2",
    "pyyaml>=6.0.3",
]

[dependency-groups]
dev = [
    "pytest-xdist>=3.8.0",
]

[tool.pytest.ini_options]
addopts = "-m 'not smoke and not performance'"
markers = [
    "smoke: live skill invocation tests (cost tokens, non-deterministic)",
    "performance: stress test matrix (125 combos, expensive, non-deterministic)",
]

# You can customize specific typing diagnostic levels here ("error", "warn", "ignore")
# Example:
# missing-return = "warn"
# index-out-of-bounds = "ignore"